<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario con Zod</title>

    <link rel="stylesheet" href="styless.css">
</head>
<body>

    <div class="container">

        <h1>📝 Registro</h1>

        <form id="registroForm">

            <!-- Nombre -->
            <input
                type="text"
                id="nombre"
                placeholder="Nombre"
            >

            <!-- Correo -->
            <input
                type="email"
                id="correo"
                placeholder="Correo"
            >

            <!-- Contraseña -->
            <input
                type="password"
                id="password"
                placeholder="Contraseña"
            >

            <button type="submit">
                Registrarse
            </button>

        </form>

        <div id="errores"></div>

    </div>

    <!-- ZOD CDN -->
    <script src="https://cdn.jsdelivr.net/npm/zod@3.23.8/lib/index.umd.min.js"></script>

    <script src="app.js"></script>

</body>
</html>
