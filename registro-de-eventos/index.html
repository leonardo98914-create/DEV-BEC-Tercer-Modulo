<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Eventos</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <h1>📋 Registro de Evento</h1>

        <form id="formulario">

            <!-- Nombre -->
            <label>Nombre:</label>
            <input type="text" id="nombre">

            <!-- Correo -->
            <label>Correo:</label>
            <input type="email" id="correo">

            <!-- Edad -->
            <label>Edad:</label>
            <input type="number" id="edad">

            <!-- Intereses -->
            <label>Intereses:</label>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" value="Tecnología">
                    Tecnología
                </label>

                <label>
                    <input type="checkbox" value="Diseño">
                    Diseño
                </label>

                <label>
                    <input type="checkbox" value="Marketing">
                    Marketing
                </label>
            </div>

            <!-- Horario -->
            <label>Horario:</label>

            <select id="horario">
                <option value="">Selecciona</option>
                <option>Mañana</option>
                <option>Tarde</option>
                <option>Noche</option>
            </select>

            <!-- Archivo -->
            <label>Identificación:</label>
            <input type="file" id="archivo">

            <button type="submit">
                Registrarse
            </button>

        </form>

        <div id="mensaje"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
