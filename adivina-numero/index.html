<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Adivina el Número</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <h1>🎯 Adivina el Número</h1>

        <p>
            Adivina un número entre 1 y 100
        </p>

        <input
            type="number"
            id="numero"
            placeholder="Ingresa un número"
        >

        <button id="btnIntentar">
            Intentar
        </button>

        <button id="btnReiniciar">
            Reiniciar Juego
        </button>

        <div id="mensaje"></div>

        <div id="intentos"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
